        width: 400px;

        padding: 20px;
      "

      <h1>Todo app</h1>
      <div style="display: flex; align-items: center; gap: 10px">
        <input
          class="add-input"
          style="
            padding: 5px;
            height: 30px;
            font-size: 20px;
            border: 2px solid black;
            border-radius: 5px;
          "
          type="text"
          placeholder="Add your new todo"
        />
        <img
          class="add-btn"
          style="background-color: purple; padding: 10px"
          width="20px"
          src="plus-symbol-button.png"
          alt=""
        />
      </div>
      <div

        style="

          width: 80%;
          align-items: center;
          margin-top: 20px;
